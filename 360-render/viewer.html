<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>360 Viewer</title>

    <style>
        body {
            margin: 0;
            background: #111;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #player-container {
            width: 1100px;
            max-width: 95vw;
            background: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        #player-header {
            padding: 14px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #player-logo {
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
            font-family: sans-serif;
            flex-shrink: 0;
        }

        #player-logo .dot {
            color: #3444DA;
        }

        #player-phrase {
            flex: 1;
            text-align: center;
            font-size: 13px;
            color: #888;
            font-style: italic;
            padding: 0 20px;
            transition: opacity 0.6s ease;
        }

        #player-phrase.fade-out {
            opacity: 0;
        }

        /* spacer to balance logo on the right */
        #header-spacer {
            flex-shrink: 0;
            width: 80px;
        }

        #canvas-container {
            width: 100%;
            height: 620px;
            position: relative;
        }

        canvas {
            display: block;
        }

        #controls {
            background: #1a1a1a;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }

        #progress {
            flex: 1;
        }

        input[type=range] {
            width: 100%;
        }

        #time {
            font-size: 12px;
            min-width: 90px;
            text-align: right;
            color: #aaa;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            border-radius: 6px;
            padding: 0;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        #zoomSlider {
            width: 100px;
        }

        #volumeSlider {
            width: 80px;
        }
    </style>
</head>

<body>

    <div id="player-container">
        <div id="player-header">
            <div id="player-logo">Prism<span class="dot">.</span></div>
            <div id="player-phrase"></div>
            <div id="header-spacer"></div>
        </div>
        <div id="canvas-container"></div>

        <div id="controls">

            <!-- PLAY / PAUSE -->
            <button id="playBtn" class="icon-btn">
                <svg id="playIcon" viewBox="0 0 24 24">
                    <polygon points="8,5 19,12 8,19" fill="white" />
                </svg>

                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
                    <rect x="6" y="5" width="4" height="14" fill="white" />
                    <rect x="14" y="5" width="4" height="14" fill="white" />
                </svg>
            </button>

            <!-- PROGRESS -->
            <input id="progress" type="range" min="0" max="100" value="0">

            <div id="time">0:00 / 0:00</div>

            <!-- VOLUME -->
            <button id="muteBtn" class="icon-btn">
                <svg id="volumeIcon" viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 4V5L7 9H3z" fill="white" />
                </svg>

                <svg id="muteIcon" viewBox="0 0 24 24" style="display:none;">
                    <path d="M3 9v6h4l5 4V5L7 9H3z" fill="white" />
                    <line x1="16" y1="8" x2="22" y2="16" stroke="white" stroke-width="2" />
                    <line x1="22" y1="8" x2="16" y2="16" stroke="white" stroke-width="2" />
                </svg>
            </button>

            <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="1">

            <!-- ZOOM -->
            <input id="zoomSlider" type="range" min="30" max="100" value="75">

            <!-- FULLSCREEN -->
            <button id="fullscreenBtn" class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h6v2H6v4H4V4zm14 0v6h-2V6h-4V4h6zM4 20v-6h2v4h4v2H4zm14-6v6h-6v-2h4v-4h2z"
                        fill="white" />
                </svg>
            </button>

        </div>
    </div>

    <script type="module" src="viewer.js"></script>
    <script>
        const phrases = [
            "Let's keep rolling — 15 minutes, make it count.",
            "That's a wrap only when quality says so.",
            "Cut! Great take — now do it even better.",
            "Action! Every task is a scene worth nailing.",
            "You're doing great — stay on time, stay on story.",
            "With great power comes great AHT responsibility.",
            "Just keep swimming… through the queue.",
            "To infinity and beyond — within 15 min!",
            "May the queue be ever in your favor.",
            "Teamwork makes the dream work — lights, camera, go!",
            "This is the way — quality, pace, together.",
            "Roll camera. Own it. That's how legends are made.",
        ];

        const el = document.getElementById('player-phrase');
        let index = Math.floor(Math.random() * phrases.length);
        el.textContent = phrases[index];

        setInterval(() => {
            el.classList.add('fade-out');
            setTimeout(() => {
                index = (index + 1) % phrases.length;
                el.textContent = phrases[index];
                el.classList.remove('fade-out');
            }, 600);
        }, 8000);
    </script>
</body>

</html>
